name: Flutter Build APK Pro

on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
        type: string
      zip_path:
        required: true
        type: string
      project_type:
        required: false
        default: flutter
        type: string
      build_type:
        required: false
        default: release
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.22.4'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Extract Project
        run: |
          mkdir -p project
          unzip -q -o "${{ inputs.zip_path }}" -d temp
          # Cek struktur folder
          if [ -d "temp" ]; then
            # Cek apakah ada folder tunggal di dalam zip
            ITEMS=$(ls -1 temp | wc -l)
            if [ $ITEMS -eq 1 ] && [ -d "temp/$(ls temp)" ]; then
              mv temp/*/* project/ 2>/dev/null || mv temp/* project/
            else
              mv temp/* project/ 2>/dev/null || true
            fi
          fi
          rm -rf temp
          ls -la project/

      - name: Validate Flutter Project
        working-directory: project
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            echo "❌ pubspec.yaml tidak ditemukan! Bukan Flutter project."
            exit 1
          fi
          if [ ! -d "android" ]; then
            echo "❌ Folder android tidak ditemukan!"
            exit 1
          fi
          echo "✅ Flutter project valid"

      - name: Flutter Doctor
        run: |
          flutter doctor -v

      - name: Clean & Get Dependencies
        working-directory: project
        run: |
          flutter clean
          flutter pub get
          flutter pub upgrade

      - name: Build APK
        working-directory: project
        run: |
          flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.job_id }}
          path: project/build/app/outputs/flutter-apk/*.apk
          retention-days: 3
          if-no-files-found: error
