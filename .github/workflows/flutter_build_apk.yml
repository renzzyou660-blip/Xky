name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Job ID dari bot"
        required: true

      zip_path:
        description: "ZIP path dari repo"
        required: false
        default: ""

      zip_url:
        description: "ZIP URL eksternal"
        required: false
        default: ""

      project_type:
        description: "flutter atau gradle"
        required: false
        default: "flutter"

      build_type:
        description: "debug atau release"
        required: false
        default: "release"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      # =========================================================
      # CHECKOUT
      # =========================================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================================================
      # SETUP JAVA MULTI VERSION
      # =========================================================

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      # =========================================================
      # SETUP FLUTTER
      # =========================================================

      - name: Setup Flutter
        if: ${{ inputs.project_type == 'flutter' }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.6"
          channel: stable
          cache: true

      # =========================================================
      # CACHE
      # =========================================================

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}

      - name: Cache Flutter Pub
        if: ${{ inputs.project_type == 'flutter' }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: flutter-pub-${{ runner.os }}

      # =========================================================
      # ACCEPT ANDROID LICENSE
      # =========================================================

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses || true

      # =========================================================
      # DOWNLOAD ZIP FROM REPO
      # =========================================================

      - name: Extract ZIP from Repo
        if: ${{ inputs.zip_path != '' }}
        run: |
          mkdir -p project

          unzip "${{ inputs.zip_path }}" -d project

          INNER=$(ls project | head -1)

          if [ -d "project/$INNER" ]; then
            shopt -s dotglob
            mv project/$INNER/* project/ 2>/dev/null || true
            rmdir project/$INNER 2>/dev/null || true
          fi

      # =========================================================
      # DOWNLOAD ZIP FROM URL
      # =========================================================

      - name: Download ZIP from URL
        if: ${{ inputs.zip_url != '' && inputs.zip_path == '' }}
        run: |
          mkdir -p project

          wget -O project.zip "${{ inputs.zip_url }}"

          unzip project.zip -d project

          INNER=$(ls project | head -1)

          if [ -d "project/$INNER" ]; then
            shopt -s dotglob
            mv project/$INNER/* project/ 2>/dev/null || true
            rmdir project/$INNER 2>/dev/null || true
          fi

      # =========================================================
      # VERIFY PROJECT
      # =========================================================

      - name: Verify Project
        run: |
          echo "========== PROJECT FILES =========="
          ls -la project/

          if [ "${{ inputs.project_type }}" = "flutter" ]; then

            if [ ! -f project/pubspec.yaml ]; then
              echo "❌ pubspec.yaml tidak ditemukan!"
              exit 1
            fi

            echo "✅ Flutter project detected"

          else

            if [ ! -f project/build.gradle ] && [ ! -f project/app/build.gradle ]; then
              echo "❌ build.gradle tidak ditemukan!"
              exit 1
            fi

            echo "✅ Android Studio project detected"

          fi

      # =========================================================
      # AUTO DETECT JAVA VERSION
      # =========================================================

      - name: Detect Java Version
        working-directory: project
        run: |
          JAVA_VER="17"

          if [ -f "gradle.properties" ]; then
            cat gradle.properties
          fi

          if grep -r "VERSION_1_8" . > /dev/null 2>&1; then
            JAVA_VER="8"
          fi

          if grep -r "JavaVersion.VERSION_11" . > /dev/null 2>&1; then
            JAVA_VER="11"
          fi

          if grep -r "JavaVersion.VERSION_17" . > /dev/null 2>&1; then
            JAVA_VER="17"
          fi

          echo "JAVA_VER=$JAVA_VER" >> $GITHUB_ENV

      # =========================================================
      # SWITCH JAVA VERSION
      # =========================================================

      - name: Switch Java 8
        if: env.JAVA_VER == '8'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Switch Java 11
        if: env.JAVA_VER == '11'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Switch Java 17
        if: env.JAVA_VER == '17'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # =========================================================
      # FIX PERMISSION
      # =========================================================

      - name: Grant Execute Permission
        working-directory: project
        run: |
          chmod +x gradlew || true

      # =========================================================
      # FLUTTER PUB GET
      # =========================================================

      - name: Flutter Pub Get
        if: ${{ inputs.project_type == 'flutter' }}
        working-directory: project
        run: |
          flutter clean
          flutter pub get

      # =========================================================
      # BUILD FLUTTER APK
      # =========================================================

      - name: Build Flutter APK
        if: ${{ inputs.project_type == 'flutter' }}
        working-directory: project
        run: |

          if [ "${{ inputs.build_type }}" = "debug" ]; then

            flutter build apk --debug --no-tree-shake-icons

          else

            flutter build apk --release --no-tree-shake-icons

          fi

          echo "========== APK RESULT =========="
          find build -name "*.apk" -type f

      # =========================================================
      # BUILD GRADLE APK
      # =========================================================

      - name: Build Gradle APK
        if: ${{ inputs.project_type == 'gradle' }}
        working-directory: project
        run: |

          chmod +x gradlew || true

          if [ "${{ inputs.build_type }}" = "debug" ]; then

            ./gradlew assembleDebug --stacktrace

          else

            ./gradlew assembleRelease --stacktrace

          fi

          echo "========== APK RESULT =========="
          find . -name "*.apk" -type f

      # =========================================================
      # UPLOAD FLUTTER APK
      # =========================================================

      - name: Upload Flutter APK
        if: ${{ inputs.project_type == 'flutter' }}
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.job_id }}
          path: |
            project/build/app/outputs/flutter-apk/*.apk
            project/build/app/outputs/apk/**/*.apk
          retention-days: 3
          if-no-files-found: error

      # =========================================================
      # UPLOAD GRADLE APK
      # =========================================================

      - name: Upload Gradle APK
        if: ${{ inputs.project_type == 'gradle' }}
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.job_id }}
          path: |
            project/**/*.apk
          retention-days: 3
          if-no-files-found: error

      # =========================================================
      # FINAL LOG
      # =========================================================

      - name: Finish
        run: |
          echo "✅ BUILD SELESAI"
          echo "PROJECT TYPE : ${{ inputs.project_type }}"
          echo "BUILD TYPE   : ${{ inputs.build_type }}"
          echo "JOB ID       : ${{ inputs.job_id }}"
