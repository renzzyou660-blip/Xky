# ================================================================
# Flutter Build APK Pro - Clean & Optimized
# ================================================================
name: Flutter Build APK Pro

on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
        type: string
        description: "Unique job identifier"
      zip_path:
        required: true
        type: string
        description: "Path to the project zip file"
      project_type:
        required: false
        default: flutter
        type: string
        description: "Project type (currently only flutter)"
      build_type:
        required: false
        default: release
        type: string
        description: "Build type: release or debug"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.0.12077973

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout & Environment Setup
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17 (primary)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Java 11 (fallback)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: gradle

      - name: Restore Java 17 as default
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ------------------------------------------------------------------
      # 2. Flutter & Android SDK Setup
      # ------------------------------------------------------------------
      - name: Setup Flutter
        if: inputs.project_type == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Android SDK
        if: inputs.project_type == 'flutter'
        uses: android-actions/setup-android@v3

      - name: Install Android Components
        if: inputs.project_type == 'flutter'
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-30" \
            "platforms;android-31" \
            "platforms;android-32" \
            "platforms;android-33" \
            "platforms;android-34" \
            "platforms;android-35" \
            "platforms;android-36" \
            "build-tools;28.0.3" \
            "build-tools;33.0.2" \
            "build-tools;34.0.0" \
            "build-tools;35.0.0" \
            "build-tools;36.0.0" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1"

      # ------------------------------------------------------------------
      # 3. Extract Project
      # ------------------------------------------------------------------
      - name: Extract project archive
        run: |
          mkdir -p project
          if [ -n "${{ inputs.zip_path }}" ]; then
            unzip -o "${{ inputs.zip_path }}" -d project
          else
            echo "ERROR: zip_path wajib diisi"
            exit 1
          fi
          # Jika pubspec.yaml berada di dalam subfolder, pindahkan ke root
          if [ -f "project/pubspec.yaml" ]; then
            echo "✅ pubspec.yaml ditemukan di root project"
          else
            SUBDIR=$(find project -name "pubspec.yaml" -type f -printf "%h\n" | head -1)
            if [ -n "$SUBDIR" ] && [ "$SUBDIR" != "project" ]; then
              echo "📁 Memindahkan dari $SUBDIR ke project/"
              mv "$SUBDIR"/* project/ 2>/dev/null || true
              mv "$SUBDIR"/.flutter* project/ 2>/dev/null || true
            fi
          fi
          ls -la project/

      # ------------------------------------------------------------------
      # 4. Pre‑build Fixes (including font_awesome_flutter)
      # ------------------------------------------------------------------
      - name: Fix font_awesome_flutter version
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          # Downgrade ke versi 10.7.0 untuk menghindari error FaIconData
          sed -i 's/font_awesome_flutter:.*/font_awesome_flutter: ^10.7.0/' pubspec.yaml
          echo "✅ font_awesome_flutter di-pin ke ^10.7.0"

      - name: Enable AndroidX
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          mkdir -p android
          touch android/gradle.properties
          grep -q "android.useAndroidX" android/gradle.properties || echo "android.useAndroidX=true" >> android/gradle.properties
          grep -q "android.enableJetifier" android/gradle.properties || echo "android.enableJetifier=true" >> android/gradle.properties

      - name: Set Gradle executable permissions
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          chmod +x android/gradlew || true
          chmod -R 777 android || true

      # ------------------------------------------------------------------
      # 5. Dependency & Cache Repair
      # ------------------------------------------------------------------
      - name: Clean previous build artifacts
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter clean || true
          rm -rf .dart_tool build

      - name: Repair pub cache
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: flutter pub cache repair || true

      - name: Get dependencies
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter pub get || (
            flutter pub cache repair
            flutter pub get
          )

      - name: Check outdated dependencies (optional)
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: dart pub outdated || true

      # ------------------------------------------------------------------
      # 6. Build APK (with fallback)
      # ------------------------------------------------------------------
      - name: Build APK (release or debug)
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons --android-skip-build-dependency-validation 2>&1 | tee ../build_output.log || (
            echo "=== Java 17 gagal, mencoba Java 11 ===" | tee -a ../build_output.log
            export JAVA_HOME=$JAVA_11_HOME
            flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons --android-skip-build-dependency-validation 2>&1 | tee -a ../build_output.log
          )

      - name: Retry with debug if release failed
        if: failure() && inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter clean
          flutter pub get
          flutter build apk --debug --no-tree-shake-icons --android-skip-build-dependency-validation 2>&1 | tee -a ../build_output.log || (
            export JAVA_HOME=$JAVA_11_HOME
            flutter build apk --debug --no-tree-shake-icons --android-skip-build-dependency-validation 2>&1 | tee -a ../build_output.log
          )

      - name: Build AAB as final fallback
        if: failure() && inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter build appbundle --release 2>&1 | tee -a ../build_output.log || (
            export JAVA_HOME=$JAVA_11_HOME
            flutter build appbundle --release 2>&1 | tee -a ../build_output.log
          )

      # ------------------------------------------------------------------
      # 7. Collect Artifacts
      # ------------------------------------------------------------------
      - name: Collect APK and AAB files
        working-directory: project
        run: |
          mkdir -p ../all_apks
          find . -name "*.apk" -type f -exec cp {} ../all_apks/ \;
          find . -name "*.aab" -type f -exec cp {} ../all_apks/ \;
          echo "✅ File yang ditemukan:"
          ls -la ../all_apks/

      - name: Pack build result
        run: |
          if [ -d "all_apks" ] && [ "$(ls -A all_apks)" ]; then
            zip -r build_result.zip all_apks
            echo "✅ build_result.zip siap upload"
          else
            echo "⚠️ Tidak ada file APK/AAB, membuat zip kosong"
            mkdir -p all_apks
            zip -r build_result.zip all_apks
          fi

      - name: Upload build result
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ inputs.job_id }}
          path: build_result.zip

      # ------------------------------------------------------------------
      # 8. Error Logging (on failure)
      # ------------------------------------------------------------------
      - name: Collect error logs
        if: failure()
        run: |
          mkdir -p error_logs
          if [ -f "build_output.log" ]; then
            cp build_output.log error_logs/build_error.log
            tail -200 build_output.log > error_logs/build_error_last200.log
          fi
          if [ -d "project" ]; then
            find project -name "*.log" -exec cp {} error_logs/ \; 2>/dev/null || true
          fi
          echo "=== BUILD FAILURE SUMMARY ===" > error_logs/summary.txt
          echo "Job ID: ${{ inputs.job_id }}" >> error_logs/summary.txt
          echo "Build Type: ${{ inputs.build_type }}" >> error_logs/summary.txt
          echo "Timestamp: $(date)" >> error_logs/summary.txt
          echo "" >> error_logs/summary.txt
          echo "Last 100 lines of build output:" >> error_logs/summary.txt
          tail -100 build_output.log >> error_logs/summary.txt 2>/dev/null || echo "No log available" >> error_logs/summary.txt

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-${{ inputs.job_id }}
          path: error_logs/
          if-no-files-found: ignore
