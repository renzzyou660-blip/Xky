name: Flutter Build APK 

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID dari bot'
        required: true
      zip_path:
        description: 'Path ZIP di repo (misal: uploads/file.zip)'
        required: false
        default: ''
      zip_url:
        description: 'URL ZIP eksternal'
        required: false
        default: ''
      project_type:
        description: 'flutter atau gradle'
        required: false
        default: 'flutter'
      build_type:
        description: 'debug atau release'
        required: false
        default: 'release'
      java_version:
        description: 'Versi Java (11 untuk lama, 17 standar, 21 untuk terbaru)'
        required: false
        default: '17'
      flutter_version:
        description: 'Versi Flutter (Kosongkan = otomatis stable terbaru, atau isi misal 3.10.0)'
        required: false
        default: ''
      app_name:
        description: 'Nama File APK (Tanpa .apk, misal: Xky). Kosongkan = app-release.apk'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java ${{ inputs.java_version }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java_version }}

      - name: Setup Flutter
        if: ${{ inputs.project_type == 'flutter' }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version != '' && inputs.flutter_version || null }}
          channel: 'stable'
          cache: true

      # ── Ambil ZIP dari repo (Anti-Error Flatten) ────────────────
      - name: Extract ZIP from Repo
        if: ${{ inputs.zip_path != '' }}
        run: |
          mkdir -p project
          echo "Mengekstrak ${{ inputs.zip_path }}..."
          unzip -q "${{ inputs.zip_path }}" -d temp_extract
          
          shopt -s dotglob nullglob
          dirs=(temp_extract/*)
          
          if [ ${#dirs[@]} -eq 1 ] && [ -d "${dirs[0]}" ]; then
            echo "📦 Terdeteksi 1 folder pembungkus, memindahkan isinya ke atas..."
            mv "${dirs[0]}"/* project/ 2>/dev/null
            mv "${dirs[0]}"/.* project/ 2>/dev/null || true
          else
            echo "📦 Tidak ada folder pembungkus, memindahkan semua file..."
            mv temp_extract/* project/ 2>/dev/null
            mv temp_extract/.* project/ 2>/dev/null || true
          fi
          rm -rf temp_extract

            # ── Ambil ZIP dari URL (Anti-Error Flatten & Bulletproof Download) ──
      - name: Download ZIP from URL
        if: ${{ inputs.zip_url != '' && inputs.zip_path == '' }}
        run: |
          mkdir -p project
          echo "Mendownload dari URL..."
          wget -q -L --user-agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" -O project.zip "${{ inputs.zip_url }}"
          unzip -q project.zip -d temp_extract
          
          shopt -s dotglob nullglob
          dirs=(temp_extract/*)
          
          if [ ${#dirs[@]} -eq 1 ] && [ -d "${dirs[0]}" ]; then
            echo "📦 Terdeteksi 1 folder pembungkus, memindahkan isinya ke atas..."
            mv "${dirs[0]}"/* project/ 2>/dev/null
            mv "${dirs[0]}"/.* project/ 2>/dev/null || true
          else
            echo "📦 Tidak ada folder pembungkus, memindahkan semua file..."
            mv temp_extract/* project/ 2>/dev/null
            mv temp_extract/.* project/ 2>/dev/null || true
          fi
          rm -rf temp_extract project.zip

      # ── Verifikasi project & Fix Environment ────────────────────
      - name: Verify Project and Fix Environment
        run: |
          echo "Isi folder project:"
          ls -la project/
          
          if [ "${{ inputs.project_type }}" = "flutter" ]; then
            if [ ! -f project/pubspec.yaml ]; then echo "❌ pubspec.yaml tidak ditemukan!"; exit 1; fi
            echo "✅ pubspec.yaml ditemukan"
            if [ -d "project/android" ]; then
              echo "sdk.dir=$ANDROID_SDK_ROOT" > project/android/local.properties
              echo "✅ local.properties berhasil dibuat"
            fi
          else
            if [ ! -f project/build.gradle ] && [ ! -f project/build.gradle.kts ] && [ ! -f project/app/build.gradle ] && [ ! -f project/app/build.gradle.kts ]; then 
              echo "❌ build.gradle tidak ditemukan!"; exit 1; 
            fi
            echo "✅ build.gradle ditemukan"
            echo "sdk.dir=$ANDROID_SDK_ROOT" > project/local.properties
            echo "✅ local.properties berhasil dibuat"
          fi

      # ── Flutter Build ──────────────────────────────────────────
      - name: Flutter Pub Get
        if: ${{ inputs.project_type == 'flutter' }}
        working-directory: project
        run: flutter pub get

      - name: Fix Android Gradle & Kotlin Version Compatibility
        if: ${{ inputs.project_type == 'flutter' }}
        working-directory: project
        run: |
          # Fix gradlew permission
          if [ -f android/gradlew ]; then
            chmod +x android/gradlew
            echo "✅ gradlew permission fixed"
          fi

          # Fix namespace jika ada package di AndroidManifest tapi tidak ada namespace di build.gradle
          if [ -f android/app/build.gradle ]; then
            if ! grep -q "namespace" android/app/build.gradle; then
              PKG=$(grep -oP 'package="\K[^"]+' android/app/src/main/AndroidManifest.xml 2>/dev/null || true)
              if [ -n "$PKG" ]; then
                sed -i "/^android {/a\\    namespace \"$PKG\"" android/app/build.gradle
                echo "✅ namespace '$PKG' ditambahkan ke build.gradle"
              fi
            fi
          fi

          # Fix compileSdkVersion terlalu lama (minimal 33)
          if [ -f android/app/build.gradle ]; then
            COMPILE_SDK=$(grep -oP 'compileSdk(Version)?\s+\K\d+' android/app/build.gradle | head -1)
            if [ -n "$COMPILE_SDK" ] && [ "$COMPILE_SDK" -lt 33 ]; then
              sed -i "s/compileSdk\(Version\)\?\s\+[0-9]\+/compileSdk 34/g" android/app/build.gradle
              echo "✅ compileSdk dinaikkan ke 34"
            fi
          fi

          # Fix targetSdkVersion terlalu lama (minimal 33)
          if [ -f android/app/build.gradle ]; then
            TARGET_SDK=$(grep -oP 'targetSdk(Version)?\s+\K\d+' android/app/build.gradle | head -1)
            if [ -n "$TARGET_SDK" ] && [ "$TARGET_SDK" -lt 33 ]; then
              sed -i "s/targetSdk\(Version\)\?\s\+[0-9]\+/targetSdk 34/g" android/app/build.gradle
              echo "✅ targetSdk dinaikkan ke 34"
            fi
          fi

          # Paksa AGP (Android Gradle Plugin) ke versi aman 8.1.0 jika terlalu lama
          if [ -f android/build.gradle ]; then
            sed -i "s/com.android.tools.build:gradle:[0-9.]\+/com.android.tools.build:gradle:8.1.0/g" android/build.gradle
            echo "✅ AGP dipaksa ke 8.1.0"
          fi

          # Fix Gradle wrapper ke versi aman 8.3
          if [ -f android/gradle/wrapper/gradle-wrapper.properties ]; then
            sed -i "s|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-bin.zip|g" android/gradle/wrapper/gradle-wrapper.properties
            echo "✅ Gradle wrapper dipaksa ke 8.3"
          fi

          # Hapus lock file yang bisa menyebabkan conflict
          find . -name "*.lock" -not -path "*/\.git/*" -delete 2>/dev/null || true
          echo "✅ Lock files dibersihkan"

      - name: Flutter Build APK
        if: ${{ inputs.project_type == 'flutter' }}
        working-directory: project
        run: |
          flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons
          echo "✅ Flutter build selesai"

      # ── Gradle Build ───────────────────────────────────────────
      - name: Gradle Build APK
        if: ${{ inputs.project_type == 'gradle' }}
        working-directory: project
        run: |
          chmod +x gradlew 2>/dev/null || chmod +x gradle.bat 2>/dev/null || true
          if [ "${{ inputs.build_type }}" = "debug" ]; then
            ./gradlew assembleDebug
          else
            ./gradlew assembleRelease
          fi
          echo "✅ Gradle build selesai"

      # ── Rename APK agar Sesuai Permintaan ──────────────────────
      - name: Find and Rename APK
        run: |
          mkdir -p final_apk
          APK_FILE=$(find project/build -name "*.apk" -type f | head -n 1)
          
          if [ -z "$APK_FILE" ]; then
            echo "❌ Gagal: Tidak ada file APK yang ditemukan setelah build!"
            exit 1
          fi
          
          echo "📝 APK mentah ditemukan di: $APK_FILE"
          
          if [ -n "${{ inputs.app_name }}" ]; then
            NAMA_AKHIR="${{ inputs.app_name }}-${{ inputs.build_type }}.apk"
          else
            NAMA_AKHIR="app-${{ inputs.build_type }}.apk"
          fi
          
          echo "🔄 Mengubah nama file APK menjadi: $NAMA_AKHIR"
          mv "$APK_FILE" "final_apk/$NAMA_AKHIR"
          echo "✅ Rename berhasil! Isi folder final_apk:"
          ls -lh final_apk/

      # ── Upload Artifact ────────────────────────────────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.job_id }}
          path: final_apk/*.apk
          retention-days: 3
          if-no-files-found: error
