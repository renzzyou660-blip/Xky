name: Flutter Build APK Pro

on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
        type: string
      zip_path:
        required: true
        type: string
      project_type:
        required: false
        default: flutter
        type: string
      build_type:
        required: false
        default: release
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        if: inputs.project_type == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Android SDK
        if: inputs.project_type == 'flutter'
        uses: android-actions/setup-android@v3

      - name: Install Android Components
        if: inputs.project_type == 'flutter'
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "platforms;android-34" \
            "platforms;android-35" \
            "build-tools;33.0.2" \
            "build-tools;34.0.0" \
            "build-tools;35.0.0"

      - name: Extract Project
        run: |
          mkdir -p project
          unzip -o "${{ inputs.zip_path }}" -d temp
          shopt -s dotglob nullglob
          dirs=(temp/*)
          if [ ${#dirs[@]} -eq 1 ] && [ -d "${dirs[0]}" ]; then
            mv "${dirs[0]}"/* project/ 2>/dev/null || true
          else
            mv temp/* project/ 2>/dev/null || true
          fi
          rm -rf temp

      - name: Flutter Doctor
        if: inputs.project_type == 'flutter'
        run: |
          flutter config --no-analytics
          flutter precache --android
          flutter doctor -v

      - name: AndroidX Fix
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          mkdir -p android
          touch android/gradle.properties
          grep -q "android.useAndroidX" android/gradle.properties || echo "android.useAndroidX=true" >> android/gradle.properties
          grep -q "android.enableJetifier" android/gradle.properties || echo "android.enableJetifier=true" >> android/gradle.properties

      - name: Clean Project
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter clean || true
          rm -rf .dart_tool build

      - name: Pub Get
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter pub get || (
            flutter pub cache repair
            flutter pub get
          )

      - name: Build APK
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons 2>&1 | tee ../build_output.log
          
          # Debug: cari lokasi APK setelah build
          echo "🔍 Mencari APK yang dihasilkan..."
          find . -name "*.apk" -type f 2>/dev/null || echo "Tidak ada APK ditemukan"

      - name: Retry Build (if failed)
        if: failure() && inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter clean
          flutter pub get
          flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons 2>&1 | tee -a ../build_output.log

      - name: Build AAB as Fallback
        if: failure() && inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter build appbundle --release 2>&1 | tee -a ../build_output.log

      - name: Collect Error Logs
        if: failure()
        run: |
          mkdir -p error_logs
          if [ -f "build_output.log" ]; then
            cp build_output.log error_logs/build_error.log
          fi
          if [ -d "project" ]; then
            find project -name "*.log" -exec cp {} error_logs/ \; 2>/dev/null || true
          fi
          if [ -d "project/android" ]; then
            find project/android -name "*.log" -exec cp {} error_logs/ \; 2>/dev/null || true
          fi
          echo "=== BUILD FAILURE SUMMARY ===" > error_logs/summary.txt
          echo "Job ID: ${{ inputs.job_id }}" >> error_logs/summary.txt
          echo "Build Type: ${{ inputs.build_type }}" >> error_logs/summary.txt
          echo "Timestamp: $(date)" >> error_logs/summary.txt
          echo "" >> error_logs/summary.txt
          echo "Last 50 lines of build output:" >> error_logs/summary.txt
          tail -50 build_output.log >> error_logs/summary.txt 2>/dev/null || echo "No log available" >> error_logs/summary.txt

      - name: Find and Upload APK
        id: find_apk
        run: |
          # Cari APK di seluruh folder project
          APK_PATH=$(find project -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "APK ditemukan di: $APK_PATH"
            mkdir -p apk_artifact
            cp "$APK_PATH" apk_artifact/
            echo "apk_found=true" >> $GITHUB_OUTPUT
          else
            echo "APK tidak ditemukan!"
            echo "apk_found=false" >> $GITHUB_OUTPUT
            # Coba cek isi folder build
            find project/build -type d 2>/dev/null || echo "Folder build tidak ada"
          fi

      - name: Upload APK
        if: steps.find_apk.outputs.apk_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.job_id }}
          path: apk_artifact/*.apk
          if-no-files-found: error

      - name: Upload Error Log Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-${{ inputs.job_id }}
          path: error_logs/
          if-no-files-found: ignore
