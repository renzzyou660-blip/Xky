name: Flutter Build APK Pro

on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
        type: string
      zip_path:
        required: true
        type: string
      project_type:
        required: false
        default: flutter
        type: string
      build_type:
        required: false
        default: release
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        if: inputs.project_type == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Android SDK
        if: inputs.project_type == 'flutter'
        uses: android-actions/setup-android@v3

      - name: Install Android Components
        if: inputs.project_type == 'flutter'
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "platforms;android-34" \
            "platforms;android-35" \
            "platforms;android-36" \
            "build-tools;33.0.2" \
            "build-tools;34.0.0" \
            "build-tools;35.0.0" \
            "build-tools;36.0.0"

      - name: Extract Project
        run: |
          mkdir -p project
          if [ -n "${{ inputs.zip_path }}" ]; then
            unzip -o "${{ inputs.zip_path }}" -d project
          else
            echo "ERROR: zip_path wajib diisi"
            exit 1
          fi
          if [ -f "project/pubspec.yaml" ]; then
            echo "✅ pubspec.yaml ditemukan di root project"
          else
            SUBDIR=$(find project -name "pubspec.yaml" -type f -printf "%h\n" | head -1)
            if [ -n "$SUBDIR" ] && [ "$SUBDIR" != "project" ]; then
              echo "📁 Memindahkan dari $SUBDIR ke project/"
              mv "$SUBDIR"/* project/ 2>/dev/null || true
              mv "$SUBDIR"/.flutter* project/ 2>/dev/null || true
            fi
          fi
          ls -la project/

      - name: Auto-Fix Build Configuration
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          echo "🔧 MENERAPKAN AUTO-FIX..."
          
          if grep -q "font_awesome_flutter:" pubspec.yaml; then
            sed -i 's/font_awesome_flutter: [^ ]*/font_awesome_flutter: 10.7.0/g' pubspec.yaml
            echo "✅ Fixed font_awesome_flutter"
          fi
          
          find android -name "build.gradle*" -type f | while read file; do
            if grep -q "compileSdk" "$file"; then
              sed -i 's/compileSdk = [0-9]\+/compileSdk = 36/g' "$file"
              sed -i 's/compileSdkVersion [0-9]\+/compileSdkVersion 36/g' "$file"
            fi
            if grep -q "targetSdk" "$file"; then
              sed -i 's/targetSdk = [0-9]\+/targetSdk = 36/g' "$file"
              sed -i 's/targetSdkVersion [0-9]\+/targetSdkVersion 36/g' "$file"
            fi
          done
          
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            sed -i 's|gradle-[0-9.]\+-all.zip|gradle-8.14-all.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          fi
          
          if ! grep -q "dependency_overrides:" pubspec.yaml; then
            echo "" >> pubspec.yaml
            echo "dependency_overrides:" >> pubspec.yaml
            echo "  font_awesome_flutter: 10.7.0" >> pubspec.yaml
          fi
          
          mkdir -p android
          cat > android/gradle.properties << 'PROPERTIES'
android.useAndroidX=true
android.enableJetifier=true
org.gradle.jvmargs=-Xmx4g
PROPERTIES
          
          echo "✅ Auto-fix selesai"

      - name: Flutter Doctor
        if: inputs.project_type == 'flutter'
        run: |
          flutter config --no-analytics
          flutter precache --android
          flutter doctor -v

      - name: Clean Project
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter clean || true
          rm -rf .dart_tool build pubspec.lock

      - name: Pub Get
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter pub get || (
            flutter pub cache repair
            flutter pub get
          )

      - name: Build APK
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons

      - name: Find and Collect APK
        working-directory: project
        run: |
          mkdir -p ../all_apks
          find . -name "*.apk" -type f | while read apk; do
            cp "$apk" ../all_apks/
          done
          ls -la ../all_apks/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.job_id }}
          path: all_apks/*.apk
          if-no-files-found: warn
