name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID dari bot'
        required: true
      zip_path:
        description: 'Path ZIP di repo'
        required: false
        default: ''
      zip_url:
        description: 'URL ZIP eksternal'
        required: false
        default: ''
      project_type:
        description: 'flutter atau gradle'
        required: false
        default: 'flutter'
      build_type:
        description: 'debug atau release'
        required: false
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        if: ${{ inputs.project_type == 'flutter' }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      # ── Ambil ZIP dari repo ──────────────────────────────────
      - name: Extract ZIP from Repo
        if: ${{ inputs.zip_path != '' }}
        run: |
          mkdir -p project
          unzip "${{ inputs.zip_path }}" -d project
          INNER=$(ls project | head -1)
          if [ -d "project/$INNER" ]; then
            shopt -s dotglob
            mv project/$INNER/* project/ 2>/dev/null || true
            rmdir project/$INNER 2>/dev/null || true
          fi

      # ── Ambil ZIP dari URL ───────────────────────────────────
      - name: Download ZIP from URL
        if: ${{ inputs.zip_url != '' && inputs.zip_path == '' }}
        run: |
          mkdir -p project
          wget -q -O project.zip "${{ inputs.zip_url }}"
          unzip project.zip -d project
          INNER=$(ls project | head -1)
          if [ -d "project/$INNER" ]; then
            shopt -s dotglob
            mv project/$INNER/* project/ 2>/dev/null || true
            rmdir project/$INNER 2>/dev/null || true
          fi

      # ── Verifikasi project ───────────────────────────────────
      - name: Verify Project
        run: |
          echo "Isi folder project:"
          ls -la project/
          if [ "${{ inputs.project_type }}" = "flutter" ]; then
            if [ ! -f project/pubspec.yaml ]; then echo "❌ pubspec.yaml tidak ditemukan!"; exit 1; fi
            echo "✅ pubspec.yaml ditemukan"
          else
            if [ ! -f project/build.gradle ] && [ ! -f project/app/build.gradle ]; then echo "❌ build.gradle tidak ditemukan!"; exit 1; fi
            echo "✅ build.gradle ditemukan"
          fi

      # ── Flutter Build ────────────────────────────────────────
      - name: Flutter Pub Get
        if: ${{ inputs.project_type == 'flutter' }}
        working-directory: project
        run: flutter pub get

      - name: Flutter Build APK
        if: ${{ inputs.project_type == 'flutter' }}
        working-directory: project
        run: |
          flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons
          echo "✅ Flutter build selesai"
          ls -lh build/app/outputs/flutter-apk/

      # ── Gradle Build ─────────────────────────────────────────
      - name: Gradle Build APK
        if: ${{ inputs.project_type == 'gradle' }}
        working-directory: project
        run: |
          chmod +x gradlew
          if [ "${{ inputs.build_type }}" = "debug" ]; then
            ./gradlew assembleDebug
          else
            ./gradlew assembleRelease
          fi
          echo "✅ Gradle build selesai"
          find . -name "*.apk" -type f

      # ── Upload Artifact Flutter ──────────────────────────────
      - name: Upload Flutter APK
        if: ${{ inputs.project_type == 'flutter' }}
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.job_id }}
          path: project/build/app/outputs/flutter-apk/app-${{ inputs.build_type }}.apk
          retention-days: 3
          if-no-files-found: error

      # ── Upload Artifact Gradle ───────────────────────────────
      - name: Upload Gradle APK
        if: ${{ inputs.project_type == 'gradle' }}
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.job_id }}
          path: |
            project/**/app-${{ inputs.build_type }}.apk
            project/**/*.apk
          retention-days: 3
          if-no-files-found: error
