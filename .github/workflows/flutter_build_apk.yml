name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "ID job dari Telegram"
        required: true
      zip_path:
        description: "Path zip di repo (mis: uploads/xxx.zip)"
        required: true
      build_type:
        description: "debug atau release"
        required: false
        default: "release"
      app_name:
        description: "Nama APK (tanpa .apk)"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Extract ZIP and handle folder wrapper
        run: |
          mkdir -p work
          echo "Mengekstrak ${{ inputs.zip_path }}..."
          cp "${{ inputs.zip_path }}" work/project.zip
          cd work
          unzip -q project.zip -d temp_extract

          shopt -s dotglob nullglob
          dirs=(temp_extract/*)

          if [ ${#dirs[@]} -eq 1 ] && [ -d "${dirs[0]}" ]; then
            echo "📦 Terdeteksi 1 folder pembungkus, memindahkan isinya..."
            mv "${dirs[0]}"/* project/ 2>/dev/null
            mv "${dirs[0]}"/.* project/ 2>/dev/null || true
          else
            echo "📦 Tidak ada folder pembungkus, memindahkan semua file..."
            mv temp_extract/* project/ 2>/dev/null
            mv temp_extract/.* project/ 2>/dev/null || true
          fi
          rm -rf temp_extract

          echo "📁 Isi folder project:"
          ls -la project/

      - name: Flutter pub get
        working-directory: work/project
        run: flutter pub get

      - name: Fix Android Gradle (biar kompatibel)
        working-directory: work/project
        run: |
          if [ -f android/app/build.gradle ]; then
            sed -i "s/compileSdk[0-9]\+/compileSdk 34/g" android/app/build.gradle
            sed -i "s/targetSdk[0-9]\+/targetSdk 34/g" android/app/build.gradle
            sed -i "s/minSdk[0-9]\+/minSdk 21/g" android/app/build.gradle
            
            if ! grep -q "namespace" android/app/build.gradle; then
              PKG=$(grep -oP 'package="\K[^"]+' android/app/src/main/AndroidManifest.xml 2>/dev/null || echo "com.example.app")
              sed -i "/^android {/a\\    namespace \"$PKG\"" android/app/build.gradle
            fi
          fi

          if [ -f android/build.gradle ]; then
            sed -i "s/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:7.4.2/g" android/build.gradle
          fi

          if [ -f android/gradle/wrapper/gradle-wrapper.properties ]; then
            sed -i "s|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.0-bin.zip|g" android/gradle/wrapper/gradle-wrapper.properties
          fi

          echo "✅ Fix Gradle selesai"

      - name: Build APK
        working-directory: work/project
        run: |
          flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons
          echo "✅ Build selesai"

      - name: Collect and rename APK
        run: |
          mkdir -p out
          APK_FILE=$(find work/project/build -name "*.apk" -type f | head -n 1)

          if [ -z "$APK_FILE" ]; then
            echo "❌ APK tidak ditemukan!"
            exit 1
          fi

          if [ -n "${{ inputs.app_name }}" ]; then
            NAMA_AKHIR="${{ inputs.app_name }}-${{ inputs.build_type }}.apk"
          else
            NAMA_AKHIR="app-${{ inputs.build_type }}.apk"
          fi

          cp "$APK_FILE" "out/$NAMA_AKHIR"
          echo "✅ APK siap: $NAMA_AKHIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.job_id }}
          path: out/*.apk
          retention-days: 3
          if-no-files-found: error
