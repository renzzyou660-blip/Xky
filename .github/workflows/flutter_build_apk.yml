name: Flutter Build APK (Ultimate Safe)

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID dari bot'
        required: true
      zip_path:
        description: 'Path ZIP di repo (misal: uploads/file.zip)'
        required: false
        default: ''
      zip_url:
        description: 'URL ZIP eksternal'
        required: false
        default: ''
      project_type:
        description: 'flutter atau gradle'
        required: false
        default: 'flutter'
      build_type:
        description: 'debug atau release'
        required: false
        default: 'release'
      java_version:
        description: 'Versi Java (11 untuk lama, 17 standar, 21 untuk terbaru)'
        required: false
        default: '17'
      flutter_version:
        description: 'Versi Flutter (Kosongkan = otomatis stable terbaru, atau isi misal 3.10.0)'
        required: false
        default: ''
      app_name:
        description: 'Nama File APK (Tanpa .apk, misal: Xky). Kosongkan = app-release.apk'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java ${{ inputs.java_version }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java_version }}

      - name: Setup Flutter
        if: ${{ inputs.project_type == 'flutter' }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version != '' && inputs.flutter_version || null }}
          channel: 'stable'
          cache: true

      # ── Ambil ZIP dari repo (Anti-Error Flatten) ────────────────
      - name: Extract ZIP from Repo
        if: ${{ inputs.zip_path != '' }}
        run: |
          mkdir -p project
          echo "Mengekstrak ${{ inputs.zip_path }}..."
          unzip -q "${{ inputs.zip_path }}" -d temp_extract
          
          shopt -s dotglob nullglob
          dirs=(temp_extract/*)
          
          if [ ${#dirs[@]} -eq 1 ] && [ -d "${dirs[0]}" ]; then
            echo "📦 Terdeteksi 1 folder pembungkus, memindahkan isinya ke atas..."
            mv "${dirs[0]}"/* project/ 2>/dev/null
            mv "${dirs[0]}"/.* project/ 2>/dev/null || true
          else
            echo "📦 Tidak ada folder pembungkus, memindahkan semua file..."
            mv temp_extract/* project/ 2>/dev/null
            mv temp_extract/.* project/ 2>/dev/null || true
          fi
          rm -rf temp_extract

            # ── Ambil ZIP dari URL (Anti-Error Flatten & Bulletproof Download) ──
      - name: Download ZIP from URL
        if: ${{ inputs.zip_url != '' && inputs.zip_path == '' }}
        run: |
          mkdir -p project
          echo "Mendownload dari URL..."
          # Ditambahkan -L untuk follow redirect dan User-Agent agar GoFile/CDN tidak memblokir
          wget -q -L --user-agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" -O project.zip "${{ inputs.zip_url }}"
          unzip -q project.zip -d temp_extract
          
          shopt -s dotglob nullglob
          dirs=(temp_extract/*)
          
          if [ ${#dirs[@]} -eq 1 ] && [ -d "${dirs[0]}" ]; then
            echo "📦 Terdeteksi 1 folder pembungkus, memindahkan isinya ke atas..."
            mv "${dirs[0]}"/* project/ 2>/dev/null
            mv "${dirs[0]}"/.* project/ 2>/dev/null || true
          else
            echo "📦 Tidak ada folder pembungkus, memindahkan semua file..."
            mv temp_extract/* project/ 2>/dev/null
            mv temp_extract/.* project/ 2>/dev/null || true
          fi
          rm -rf temp_extract project.zip

      # ── Verifikasi project & Fix Environment ────────────────────
      - name: Verify Project and Fix Environment
        run: |
          echo "Isi folder project:"
          ls -la project/
          
          if [ "${{ inputs.project_type }}" = "flutter" ]; then
            if [ ! -f project/pubspec.yaml ]; then echo "❌ pubspec.yaml tidak ditemukan!"; exit 1; fi
            echo "✅ pubspec.yaml ditemukan"
            # Fix local.properties agar Gradle tidak error SDK not found
            if [ -d "project/android" ]; then
              echo "sdk.dir=$ANDROID_SDK_ROOT" > project/android/local.properties
              echo "✅ local.properties berhasil dibuat"
            fi
          else
            if [ ! -f project/build.gradle ] && [ ! -f project/build.gradle.kts ] && [ ! -f project/app/build.gradle ] && [ ! -f project/app/build.gradle.kts ]; then 
              echo "❌ build.gradle tidak ditemukan!"; exit 1; 
            fi
            echo "✅ build.gradle ditemukan"
            echo "sdk.dir=$ANDROID_SDK_ROOT" > project/local.properties
            echo "✅ local.properties berhasil dibuat"
          fi

      # ── Flutter Build ──────────────────────────────────────────
      - name: Flutter Pub Get
        if: ${{ inputs.project_type == 'flutter' }}
        working-directory: project
        run: flutter pub get

      - name: Flutter Build APK
        if: ${{ inputs.project_type == 'flutter' }}
        working-directory: project
        run: |
          flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons
          echo "✅ Flutter build selesai"

      # ── Gradle Build ───────────────────────────────────────────
      - name: Gradle Build APK
        if: ${{ inputs.project_type == 'gradle' }}
        working-directory: project
        run: |
          chmod +x gradlew 2>/dev/null || chmod +x gradle.bat 2>/dev/null || true
          if [ "${{ inputs.build_type }}" = "debug" ]; then
            ./gradlew assembleDebug
          else
            ./gradlew assembleRelease
          fi
          echo "✅ Gradle build selesai"

      # ── Rename APK agar Sesuai Permintaan ──────────────────────
      - name: Find and Rename APK
        run: |
          mkdir -p final_apk
          # Cari file APK apapun yang dihasilkan
          APK_FILE=$(find project/build -name "*.apk" -type f | head -n 1)
          
          if [ -z "$APK_FILE" ]; then
            echo "❌ Gagal: Tidak ada file APK yang ditemukan setelah build!"
            exit 1
          fi
          
          echo "📝 APK mentah ditemukan di: $APK_FILE"
          
          # Logika penamaan APK
          if [ -n "${{ inputs.app_name }}" ]; then
            NAMA_AKHIR="${{ inputs.app_name }}-${{ inputs.build_type }}.apk"
          else
            NAMA_AKHIR="app-${{ inputs.build_type }}.apk"
          fi
          
          echo "🔄 Mengubah nama file APK menjadi: $NAMA_AKHIR"
          mv "$APK_FILE" "final_apk/$NAMA_AKHIR"
          echo "✅ Rename berhasil! Isi folder final_apk:"
          ls -lh final_apk/

      # ── Upload Artifact ────────────────────────────────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.job_id }}
          path: final_apk/*.apk
          retention-days: 3
          if-no-files-found: error
