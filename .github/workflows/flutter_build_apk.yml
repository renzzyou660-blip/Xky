name: Flutter Build APK Pro

on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
        type: string
      zip_path:
        required: true
        type: string
      project_type:
        required: false
        default: flutter
        type: string
      build_type:
        required: false
        default: release
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Flutter
        if: inputs.project_type == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Android SDK
        if: inputs.project_type == 'flutter'
        uses: android-actions/setup-android@v3

      - name: Install Android Components
        if: inputs.project_type == 'flutter'
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "platforms;android-34" \
            "platforms;android-35" \
            "platforms;android-36" \
            "build-tools;33.0.2" \
            "build-tools;34.0.0" \
            "build-tools;35.0.0" \
            "build-tools;36.0.0" \
            "ndk;27.0.12077973"

      - name: Extract Project
        run: |
          mkdir -p project
          if [ -n "${{ inputs.zip_path }}" ]; then
            unzip -o "${{ inputs.zip_path }}" -d project
          else
            echo "ERROR: zip_path wajib diisi"
            exit 1
          fi
          if [ -f "project/pubspec.yaml" ]; then
            echo "✅ pubspec.yaml ditemukan di root project"
          else
            SUBDIR=$(find project -name "pubspec.yaml" -type f -printf "%h\n" | head -1)
            if [ -n "$SUBDIR" ] && [ "$SUBDIR" != "project" ]; then
              echo "📁 Memindahkan dari $SUBDIR ke project/"
              shopt -s dotglob
              mv "$SUBDIR"/* project/ 2>/dev/null || true
              shopt -u dotglob
            fi
          fi
          ls -la project/

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ runner.os }}-${{ hashFiles('project/pubspec.lock') }}
          restore-keys: |
            flutter-pub-${{ runner.os }}-

      - name: Fix Gradle Permission
        working-directory: project
        run: |
          chmod +x android/gradlew 2>/dev/null || true

      - name: Flutter Doctor
        if: inputs.project_type == 'flutter'
        run: |
          flutter config --no-analytics
          flutter precache --android
          flutter doctor -v

      - name: AndroidX Fix
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          mkdir -p android
          touch android/gradle.properties
          grep -q "android.useAndroidX" android/gradle.properties || echo "android.useAndroidX=true" >> android/gradle.properties
          grep -q "android.enableJetifier" android/gradle.properties || echo "android.enableJetifier=true" >> android/gradle.properties

      - name: Clean Project
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter clean || true
          rm -rf .dart_tool build

      - name: Pub Get
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter pub get || (
            flutter pub cache repair
            flutter pub get
          )

      - name: Build APK
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons 2>&1 | tee ../build_output.log || (
            flutter clean
            flutter pub get || true
            flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons 2>&1 | tee -a ../build_output.log || (
              flutter pub cache repair || true
              flutter pub get
              flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons 2>&1 | tee -a ../build_output.log
            )
          )

      - name: Build AAB as Fallback
        if: failure() && inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter build appbundle --release 2>&1 | tee -a ../build_output.log

      - name: Verify APK or AAB Exists
        working-directory: project
        run: |
          echo "=== APK FILES ==="
          find . -name "*.apk" -type f

          echo "=== AAB FILES ==="
          find . -name "*.aab" -type f

          APK_COUNT=$(find . -name "*.apk" -type f | wc -l)
          AAB_COUNT=$(find . -name "*.aab" -type f | wc -l)

          echo "APK_COUNT=$APK_COUNT"
          echo "AAB_COUNT=$AAB_COUNT"

          if [ "$APK_COUNT" -eq 0 ] && [ "$AAB_COUNT" -eq 0 ]; then
            echo "APK dan AAB tidak ditemukan setelah build"
            exit 1
          fi

      - name: Find and Collect APK
        working-directory: project
        run: |
          echo "🔍 Mencari semua file .apk di project..."
          find . -name "*.apk" -type f
          echo ""
          echo "📁 Mencari folder build/outputs..."
          find . -type d -path "*/build/outputs/*" | head -20
          echo ""
          mkdir -p ../all_apks
          find . -name "*.apk" -type f | while IFS= read -r apk; do
            cp "$apk" ../all_apks/
          done
          echo "✅ APK yang ditemukan:"
          ls -la ../all_apks/

      - name: Collect Error Logs
        if: failure()
        run: |
          mkdir -p error_logs
          if [ -f "build_output.log" ]; then
            cp build_output.log error_logs/build_error.log
          fi
          if [ -d "project" ]; then
            find project -name "*.log" -exec cp {} error_logs/ \; 2>/dev/null || true
          fi
          if [ -d "project/android" ]; then
            find project/android -name "*.log" -exec cp {} error_logs/ \; 2>/dev/null || true
          fi
          echo "=== BUILD FAILURE SUMMARY ===" > error_logs/summary.txt
          echo "Job ID: ${{ inputs.job_id }}" >> error_logs/summary.txt
          echo "Build Type: ${{ inputs.build_type }}" >> error_logs/summary.txt
          echo "Timestamp: $(date)" >> error_logs/summary.txt
          echo "" >> error_logs/summary.txt
          echo "Last 50 lines of build output:" >> error_logs/summary.txt
          tail -50 build_output.log >> error_logs/summary.txt 2>/dev/null || echo "No log available" >> error_logs/summary.txt

      - name: Debug APK Before Upload
        run: |
          echo "===== SEMUA APK ====="
          find . -name "*.apk" -type f

          echo ""
          echo "===== FOLDER all_apks ====="
          ls -lah all_apks || true

          echo ""
          echo "===== BUILD OUTPUT ====="
          find project/build -name "*.apk" -type f || true

      - name: Debug Flutter Outputs
        run: |
          echo "=== flutter-apk ==="
          find project/build/app/outputs/flutter-apk -type f 2>/dev/null || true

          echo "=== outputs/apk ==="
          find project -path "*/outputs/apk/*" -type f 2>/dev/null || true

          echo "=== outputs/bundle ==="
          find project -path "*/outputs/bundle/*" -type f 2>/dev/null || true

      - name: Collect APK
        run: |
          mkdir -p apk_artifact

          APK_LIST=$(find project -name "*.apk" -type f)

          echo "$APK_LIST"

          for apk in $APK_LIST; do
            cp "$apk" apk_artifact/
          done

          echo "Isi apk_artifact:"
          ls -lah apk_artifact

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.job_id }}
          path: |
            apk_artifact/
            project/build/app/outputs/flutter-apk/*.apk
            project/**/outputs/apk/**/*.apk
          if-no-files-found: ignore

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: aab-${{ inputs.job_id }}
          path: |
            project/**/*.aab
          if-no-files-found: ignore

      - name: Upload Error Log Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-${{ inputs.job_id }}
          path: error_logs/
          if-no-files-found: ignore
