name: Flutter Build APK Pro

on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
        type: string
      zip_path:
        required: true
        type: string
      project_type:
        required: false
        default: flutter
        type: string
      build_type:
        required: false
        default: release
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        if: inputs.project_type == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Android SDK
        if: inputs.project_type == 'flutter'
        uses: android-actions/setup-android@v3

      - name: Install Android Components
        if: inputs.project_type == 'flutter'
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "platforms;android-34" \
            "platforms;android-35" \
            "build-tools;33.0.2" \
            "build-tools;34.0.0" \
            "build-tools;35.0.0" \
            "platforms;android-36"

      - name: Extract Project
        run: |
          mkdir -p project
          if [ -n "${{ inputs.zip_path }}" ]; then
            unzip -o "${{ inputs.zip_path }}" -d project
          else
            echo "ERROR: zip_path wajib diisi"
            exit 1
          fi
          if [ -f "project/pubspec.yaml" ]; then
            echo "✅ pubspec.yaml ditemukan di root project"
          else
            SUBDIR=$(find project -name "pubspec.yaml" -type f -printf "%h\n" | head -1)
            if [ -n "$SUBDIR" ] && [ "$SUBDIR" != "project" ]; then
              echo "📁 Memindahkan dari $SUBDIR ke project/"
              mv "$SUBDIR"/* project/ 2>/dev/null || true
              mv "$SUBDIR"/.flutter* project/ 2>/dev/null || true
            fi
          fi
          ls -la project/

      - name: Flutter Doctor
        if: inputs.project_type == 'flutter'
        run: |
          flutter config --no-analytics
          flutter precache --android
          flutter doctor -v

      - name: AndroidX Fix
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          mkdir -p android
          touch android/gradle.properties
          grep -q "android.useAndroidX" android/gradle.properties || echo "android.useAndroidX=true" >> android/gradle.properties
          grep -q "android.enableJetifier" android/gradle.properties || echo "android.enableJetifier=true" >> android/gradle.properties
          if [ -f "android/app/build.gradle.kts" ]; then
            sed -i 's/compileSdk = [0-9]*/compileSdk = 36/' android/app/build.gradle.kts
            grep -q "compileSdk" android/app/build.gradle.kts || sed -i '/android {/a\    compileSdk = 36' android/app/build.gradle.kts
          fi
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 36/' android/app/build.gradle
            grep -q "compileSdkVersion" android/app/build.gradle || sed -i '/android {/a\    compileSdkVersion 36' android/app/build.gradle
          fi

      - name: Clean Project
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter clean || true
          rm -rf .dart_tool build

      - name: Pub Get
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          if grep -q "font_awesome_flutter" pubspec.yaml; then
            for VER in "^11.0.0" "^10.7.0" "^10.5.0" "^10.9.0"; do
              sed -i "s/font_awesome_flutter:.*/font_awesome_flutter: $VER/" pubspec.yaml
              flutter pub get 2>/dev/null && break || true
            done
          else
            flutter pub get || (
              flutter pub cache repair
              flutter pub get
            )
          fi

      - name: Build APK
        if: inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons --android-skip-build-dependency-validation 2>&1 | tee ../build_output.log

      - name: Retry Build (if failed)
        if: failure() && inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter clean
          flutter pub get
          flutter build apk --${{ inputs.build_type }} --no-tree-shake-icons --android-skip-build-dependency-validation 2>&1 | tee -a ../build_output.log

      - name: Build AAB as Fallback
        if: failure() && inputs.project_type == 'flutter'
        working-directory: project
        run: |
          flutter build appbundle --release 2>&1 | tee -a ../build_output.log

      - name: Find and Collect APK
        working-directory: project
        run: |
          echo "🔍 Mencari semua file .apk di project..."
          find . -name "*.apk" -type f
          echo ""
          echo "📁 Mencari folder build/outputs..."
          find . -type d -path "*/build/outputs/*" | head -20
          echo ""
          mkdir -p ../all_apks
          find . -name "*.apk" -type f | while IFS= read -r apk; do
            cp "$apk" ../all_apks/
          done
          echo "✅ APK yang ditemukan:"
          ls -la ../all_apks/

      - name: Collect Error Logs
        if: failure()
        run: |
          mkdir -p error_logs
          if [ -f "build_output.log" ]; then
            cp build_output.log error_logs/build_error.log
          fi
          if [ -d "project" ]; then
            find project -name "*.log" -exec cp {} error_logs/ \; 2>/dev/null || true
          fi
          if [ -d "project/android" ]; then
            find project/android -name "*.log" -exec cp {} error_logs/ \; 2>/dev/null || true
          fi
          echo "=== BUILD FAILURE SUMMARY ===" > error_logs/summary.txt
          echo "Job ID: ${{ inputs.job_id }}" >> error_logs/summary.txt
          echo "Build Type: ${{ inputs.build_type }}" >> error_logs/summary.txt
          echo "Timestamp: $(date)" >> error_logs/summary.txt
          echo "" >> error_logs/summary.txt
          echo "Last 50 lines of build output:" >> error_logs/summary.txt
          tail -50 build_output.log >> error_logs/summary.txt 2>/dev/null || echo "No log available" >> error_logs/summary.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.job_id }}
          path: all_apks/*.apk
          if-no-files-found: warn

      - name: Upload Error Log Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-${{ inputs.job_id }}
          path: error_logs/
          if-no-files-found: ignore
